<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>관문 담당자 카드 — 파워웨이브 2026</title>
<style>
:root {
  --navy:#1a2744; --blue:#3b5bdb; --gold:#f59f00;
  --green:#2f9e44; --red:#e03131;
  --gray:#868e96; --border:#dee2e6; --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f0f2f8;color:#212529;min-height:100vh;}

.app-header{background:linear-gradient(135deg,var(--navy),#2d4a9e);color:#fff;padding:20px 16px 22px;text-align:center;}
.header-tag{display:inline-block;background:var(--gold);color:var(--navy);font-size:10px;font-weight:800;letter-spacing:1.5px;padding:3px 10px;border-radius:20px;margin-bottom:8px;}
.header-title{font-size:19px;font-weight:800;}
.header-sub{font-size:12px;opacity:.75;margin-top:4px;}

.content{max-width:520px;margin:0 auto;padding:16px 16px 60px;}

/* ── Station selector ── */
.station-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px;}
.station-btn{padding:12px 4px;border:2px solid var(--border);border-radius:10px;background:#fff;font-size:12px;font-weight:800;color:var(--navy);cursor:pointer;transition:all .15s;font-family:inherit;}
.station-btn:active{transform:scale(.95);}
.station-btn.selected{border-color:var(--blue);background:var(--blue);color:#fff;}
.station-btn.final{grid-column:span 4;}

/* ── Card ── */
.card{background:#fff;border-radius:var(--radius);box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:14px;overflow:hidden;display:none;}
.card.visible{display:block;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-top{padding:16px 18px;color:#fff;}
.card-num{font-size:11px;font-weight:800;letter-spacing:2px;opacity:.75;text-transform:uppercase;}
.card-name{font-size:20px;font-weight:800;margin-top:4px;}
.card-verse{font-size:12px;opacity:.8;margin-top:6px;}
.card-body{padding:18px;}

.section-lbl{font-size:11px;font-weight:800;color:var(--gray);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.block{margin-bottom:18px;}
.block:last-child{margin-bottom:0;}
.block p{font-size:13.5px;line-height:1.75;color:#343a40;}

/* 30초 멘트 — 크게, 읽기 쉽게 */
.script-box{background:linear-gradient(160deg,#fffdf5,#fff);border:1.5px solid #ffe8a3;border-radius:10px;padding:16px;}
.script-box p{font-size:15px;line-height:1.85;color:#1a2744;font-weight:500;}
.script-timer{font-size:11px;color:var(--gold);font-weight:800;margin-bottom:8px;}

.pass-box{background:#ebfbee;border:1.5px solid #b2f2bb;border-radius:10px;padding:14px 16px;font-size:13px;color:#2b8a3e;line-height:1.7;}
.safety-box{background:#fff5f5;border:1.5px solid #ffc9c9;border-radius:10px;padding:14px 16px;font-size:13px;color:#c92a2a;line-height:1.7;}
.supply-tags{display:flex;flex-wrap:wrap;gap:6px;}
.supply-tag{background:#f1f3f5;color:#495057;font-size:12px;font-weight:600;padding:5px 10px;border-radius:20px;}

.nav-row{display:flex;gap:8px;margin-top:4px;}
.nav-btn{flex:1;padding:13px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;background:#fff;color:var(--navy);box-shadow:0 2px 8px rgba(0,0,0,.06);}
.nav-btn:active{opacity:.8;}

.back-link{display:block;text-align:center;margin-top:22px;font-size:12px;color:var(--gray);text-decoration:none;}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-tag">DAY 2 · STATION CARD</div>
  <div class="header-title">관문 담당자 카드</div>
  <div class="header-sub">돌파의 순례길 — 6관문 + Final</div>
</header>

<div class="content">

  <div class="station-grid" id="stationGrid"></div>

  <div id="cardArea"></div>

  <a class="back-link" href="index.html">← 기획 대시보드로 돌아가기</a>
</div>

<script>
const STATIONS = [
  {
    id: 1, label: '1/6', name: '붉은 줄의 문', color: 'linear-gradient(135deg,#7d1a1a,#c92a2a)',
    verse: '여호수아 2장 — 라합의 붉은 줄',
    game: '빨간 실 거미줄 레이저 미로 통과',
    script: '라합은 이스라엘 백성도, 정탐꾼의 가족도 아니었어요. 그런데 창문에 붉은 줄 하나를 내려서 살길을 얻었죠. 그 줄은 라합이 만든 게 아니라 정탐꾼이 준 약속이었어요. 오늘 여러분이 돌파해야 할 것도 똑같아요 — 내 실력이 아니라, 하나님이 이미 주신 약속을 붙잡을 때 열립니다.',
    pass: '제한시간 내 실 미로를 건드리지 않고 통과 (건드리면 처음부터 재시도, 총 3회까지)',
    safety: '실/미로에 걸려 넘어지지 않도록 바닥 정리, 진행 중 뒷사람과 간격 유지',
    supplies: ['빨간 털실/끈', '방울', '스톱워치', '성공 스티커'],
  },
  {
    id: 2, label: '2/6', name: '요단강', color: 'linear-gradient(135deg,#0b3d91,#3b5bdb)',
    verse: '여호수아 3장 — 요단강 도하',
    game: '제한된 발판으로 전원 건너기 — 언약궤 두 명이 들고 이동',
    script: '요단강은 이스라엘이 40년 광야 끝에 마주한 마지막 장애물이었어요. 물이 갈라진 건 제사장들이 강가에 서서 기다렸을 때가 아니라, 실제로 발을 물에 담갔을 때였죠. 방금 발판 위에서 언약궤를 들고 건넌 것처럼, 돌파는 마음으로 결심하는 게 아니라 실제로 한 걸음 내딛는 데서 시작돼요.',
    pass: '전 조원이 발판 밖으로 발을 딛지 않고 반대편 도착 + 언약궤를 떨어뜨리지 않음',
    safety: '발판 주변 바닥 미끄럼 주의 (물놀이 버전으로 진행 시 특히 주의)',
    supplies: ['파란 천/테이프', '발판', '성경책 모형', '기념 돌 카드'],
  },
  {
    id: 3, label: '3/6', name: '무거운 짐의 언덕', color: 'linear-gradient(135deg,#5c3a21,#8c5a33)',
    verse: '천로역정 — 크리스천의 짐',
    game: '단어 카드 붙인 짐 들고 걷다가 십자가 앞에 내려놓기',
    script: '크리스천은 등에 진 무거운 죄의 짐을 지고 걷다가, 십자가 앞에서야 그 짐을 내려놓을 수 있었어요. 여러분도 방금 짐을 메고 걷다가 내려놓았죠. 그 짐에 적힌 단어들은 사실 우리가 평소에 꽁꽁 붙들고 사는 걱정이나 죄책감일 수 있어요. 내려놓지 않으면 계속 우리 발걸음을 느리게 만듭니다.',
    pass: '짐을 메고 출발해 십자가 표시 앞에 실제로 내려놓는 동작까지 완료',
    safety: '짐 무게(물병·모래주머니) 너무 무겁지 않게 조정, 이동 중 주변 확인',
    supplies: ['가방', '물병·모래주머니', '단어 카드', '십자가 표시'],
  },
  {
    id: 4, label: '4/6', name: '의심의 숲', color: 'linear-gradient(135deg,#1a4429,#2f9e44)',
    verse: '천로역정 — 의심의 성',
    game: '한 명 눈가림 — 조원 말로만 안내해서 코스 통과',
    script: '눈을 가린 친구는 아무것도 안 보이는 상태에서 오직 조원의 목소리만 믿고 걸었어요. 우리 믿음의 길도 똑같습니다 — 앞이 항상 선명하게 보이지 않아요. 그 순간에도 하나님은 말씀으로 우리를 인도하고 계세요. 방금 들었던 그 목소리처럼요.',
    pass: '눈가린 학생이 장애물과 충돌 없이 코스 끝까지 도달 (조원 음성 안내만 허용)',
    safety: '눈가리개 착용 학생 주변 장애물 재확인, 안내자 밀착 동행 필수',
    supplies: ['눈가리개', '장애물(의자·콘)'],
  },
  {
    id: 5, label: '5/6', name: '허영의 장터', color: 'linear-gradient(135deg,#8a5a00,#f59f00)',
    verse: '천로역정 허영시장 / 여호수아 24:15',
    game: '선택 카드 — 인기 vs 정직 / 편함 vs 순종 / 비교 vs 감사 등',
    script: '허영시장에서는 늘 인기냐 정직이냐, 편함이냐 순종이냐를 선택해야 했어요. 돌파는 캠프에서 한 번 크게 결심한다고 끝나는 게 아니에요. 학교에서, 집에서, 매일 매 순간 "오늘 나는 하나님을 선택한다"고 다시 결정하는 것 — 그게 진짜 돌파입니다.',
    pass: '카드 선택 자체가 통과 조건 (정답은 없음 — 선택 후 왜 그렇게 골랐는지 한 마디 나누면 통과)',
    safety: '특이 안전 요소 낮음',
    supplies: ['선택 카드 세트 (제작 필요)'],
  },
  {
    id: 6, label: '6/6', name: '침묵의 성벽', color: 'linear-gradient(135deg,#2b2d42,#495057)',
    verse: '여호수아 6장 — 여리고성',
    game: '말하지 않고 침묵으로 지시문 수행',
    script: '여리고성이 무너진 건 이스라엘 백성이 힘으로 밀어붙여서가 아니라, 하나님이 시키신 대로 순종했기 때문이에요. 오늘 여러분도 말 한마디 못하고 침묵 속에서 지시문만 따랐죠. 답답했나요? 순종은 원래 이해가 다 안 되는 상태에서 시작됩니다.',
    pass: '제한시간 내 침묵을 깨지 않고 지시문 과제를 완수 (말하면 처음부터 재시도)',
    safety: '특이 안전 요소 낮음',
    supplies: ['지시문 카드', '말씀 카드'],
  },
  {
    id: 'final', label: 'Final', name: '약속의 땅 — 전체 집합 미션', color: 'linear-gradient(135deg,#7a4a00,#f59f00)',
    verse: '가나안 입성',
    game: '6관문을 통과한 전 조가 한 장소에 재집합 → 조별 결단문 완성 → 다 함께 외침 → 상징적인 여리고 성벽(박스 성벽) 무너뜨리기',
    script: '6개 관문을 다 통과했어요. 라합의 약속, 요단강 도하, 짐을 내려놓음, 믿음의 순종, 매일의 선택, 침묵의 순종 — 이 모든 게 오늘 여러분이 지나온 길입니다. 이제 진짜 여리고성이 남았어요. 이건 게임이 아니라 선포입니다. 오늘 외치는 그 한 문장이 이번 여름 하나님 앞에서 실제로 돌파할 것을 정하는 순간이 될 거예요.',
    pass: '조별 결단문("우리는 ______을 돌파하고, 하나님을 따라 ______하겠습니다.")을 완성해 다 함께 외친 후 성벽을 무너뜨리는 것 자체가 통과 (탈락 없음)',
    safety: '박스 성벽 무너뜨릴 때 주변 학생과의 거리 확보, 파편(테이프·박스 조각) 정리',
    supplies: ['박스 성벽', '단어 카드', '스티커', '결단문 종이'],
  },
];

let current = 0;

function buildGrid() {
  const grid = document.getElementById('stationGrid');
  grid.innerHTML = STATIONS.map((s, i) => {
    const isFinal = s.id === 'final';
    return `<button class="station-btn${isFinal ? ' final' : ''}" data-i="${i}" onclick="selectStation(${i})">${s.label} ${isFinal ? '· ' + s.name : ''}</button>`;
  }).join('');
}

function selectStation(i) {
  current = i;
  document.querySelectorAll('.station-btn').forEach((b, idx) => b.classList.toggle('selected', idx === i));
  renderCard(STATIONS[i]);
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderCard(s) {
  const area = document.getElementById('cardArea');
  area.innerHTML = `
    <div class="card visible">
      <div class="card-top" style="background:${s.color};">
        <div class="card-num">STATION ${s.label}</div>
        <div class="card-name">${s.name}</div>
        <div class="card-verse">📖 ${s.verse}</div>
      </div>
      <div class="card-body">
        <div class="block">
          <div class="section-lbl">🎮 게임</div>
          <p>${s.game}</p>
        </div>
        <div class="block">
          <div class="section-lbl">🎙 30초 영적 해석 멘트 (게임 종료 직후 읽어주세요)</div>
          <div class="script-box">
            <div class="script-timer">⏱ 약 30초 분량</div>
            <p>${s.script}</p>
          </div>
        </div>
        <div class="block">
          <div class="section-lbl">✅ 통과 기준</div>
          <div class="pass-box">${s.pass}</div>
        </div>
        <div class="block">
          <div class="section-lbl">⚠️ 안전 주의사항</div>
          <div class="safety-box">${s.safety}</div>
        </div>
        <div class="block">
          <div class="section-lbl">🧰 준비물</div>
          <div class="supply-tags">${s.supplies.map(x => `<span class="supply-tag">${x}</span>`).join('')}</div>
        </div>
        <div class="nav-row">
          <button class="nav-btn" onclick="stepStation(-1)">← 이전 관문</button>
          <button class="nav-btn" onclick="stepStation(1)">다음 관문 →</button>
        </div>
      </div>
    </div>`;
}

function stepStation(delta) {
  const next = (current + delta + STATIONS.length) % STATIONS.length;
  selectStation(next);
}

buildGrid();
selectStation(0);
</script>
</body>
</html>
