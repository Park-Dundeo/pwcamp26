<title>관문 담당자 카드 — 파워웨이브 2026</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root {
  --navy:#2B2350; --blue:#6741D9; --gold:#FFB01F;
  --green:#0CA678; --red:#F03E3E;
  --gray:#8B84A3; --border:#E4E0F5; --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard Variable',Pretendard,-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#ffffff;color:#212529;min-height:100vh;}

.app-header{background:linear-gradient(120deg,#E8481F 0%,#D6336C 48%,#5F3DC4 100%);color:#fff;padding:20px 16px 22px;text-align:center;}
.header-tag{display:inline-block;background:var(--gold);color:var(--navy);font-size:10px;font-weight:800;letter-spacing:1.5px;padding:3px 10px;border-radius:20px;margin-bottom:8px;}
.header-title{font-size:19px;font-weight:800;}
.header-sub{font-size:12px;opacity:.75;margin-top:4px;}

.content{max-width:520px;margin:0 auto;padding:16px 16px 60px;}

/* ── Station selector ── */
.station-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px;}
.station-btn{padding:12px 4px;border:2px solid var(--border);border-radius:10px;background:#fff;font-size:12px;font-weight:800;color:var(--navy);cursor:pointer;transition:all .15s;font-family:inherit;}
.station-btn:active{transform:scale(.95);}
.station-btn.selected{border-color:var(--blue);background:var(--blue);color:#fff;}
.station-btn.final{grid-column:span 4;}

/* ── Card ── */
.card{background:#fff;border-radius:var(--radius);box-shadow:0 4px 20px rgba(20,29,56,.07);margin-bottom:14px;overflow:hidden;display:none;}
.card.visible{display:block;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-top{padding:16px 18px;color:#fff;}
.card-num{font-size:11px;font-weight:800;letter-spacing:2px;opacity:.75;text-transform:uppercase;}
.card-name{font-size:20px;font-weight:800;margin-top:4px;}
.card-verse{font-size:12px;opacity:.8;margin-top:6px;}
.card-body{padding:18px;}

.section-lbl{font-size:11px;font-weight:800;color:var(--gray);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.block{margin-bottom:18px;}
.block:last-child{margin-bottom:0;}
.block p{font-size:13.5px;line-height:1.75;color:#343a40;}

/* 30초 멘트 — 크게, 읽기 쉽게 */
.script-box{background:linear-gradient(160deg,#fffdf5,#fff);border:1.5px solid #ffe8a3;border-radius:10px;padding:16px;}
.script-box p{font-size:15px;line-height:1.85;color:#1a2744;font-weight:500;}
.script-timer{font-size:11px;color:var(--gold);font-weight:800;margin-bottom:8px;}

.pass-box{background:#E3FAF3;border:1.5px solid #96E6CF;border-radius:10px;padding:14px 16px;font-size:13px;color:#0B7A5C;line-height:1.7;}
.safety-box{background:#fff5f5;border:1.5px solid #ffc9c9;border-radius:10px;padding:14px 16px;font-size:13px;color:#c92a2a;line-height:1.7;}
.supply-tags{display:flex;flex-wrap:wrap;gap:6px;}
.supply-tag{background:#F0EDF9;color:#495057;font-size:12px;font-weight:600;padding:5px 10px;border-radius:20px;}

.owner-chip{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;padding:6px 12px;border-radius:20px;background:#EFEAFB;color:var(--blue);}
.owner-chip.unset{background:#F0EDF9;color:var(--gray);}
.setup-box{background:#F5F3FB;border-radius:10px;padding:12px 14px;font-size:13px;color:#343a40;line-height:1.7;}
.rain-box{background:#EFEAFB;border:1.5px solid #a5d8ff;border-radius:10px;padding:12px 14px;font-size:13px;color:#1864ab;line-height:1.7;}
.next-box{background:#FFF4D6;border:1.5px solid #FFD43B;border-radius:10px;padding:12px 14px;font-size:13px;color:#8A6410;line-height:1.7;font-style:italic;}

.nav-row{display:flex;gap:8px;margin-top:4px;}
.nav-btn{flex:1;padding:13px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;background:#fff;color:var(--navy);box-shadow:0 3px 14px rgba(20,29,56,.06);}
.nav-btn:active{opacity:.8;}

.back-link{display:block;text-align:center;margin-top:22px;font-size:12px;color:var(--gray);text-decoration:none;}

/* ══ 2026-07-10 디자인 컨셉 v2: SUMMER BREAKTHROUGH (여름 캠프 포스터) ══ */
@font-face{font-family:'GmarketSansBold';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff');font-weight:normal;font-display:swap;}
*{-webkit-tap-highlight-color:transparent;}
body{letter-spacing:-0.011em;background:#ffffff;color:#2B2350;}
.header-title,.card-name,.dest-name,.rp-team,.theme-title,.t-headline,.site-title{font-family:'GmarketSansBold','Pretendard Variable',sans-serif;letter-spacing:0;}
h1,h2,h3{letter-spacing:-0.02em;}
.header-tag,.rp-badge,.dest-teams{background:#FFD43B !important;color:#2B2350 !important;box-shadow:2px 2px 0 rgba(43,35,80,.25);}
button{transition:transform .12s ease,box-shadow .2s ease,opacity .2s ease,background .2s ease;}
button:not(:disabled):active{transform:translate(1px,2px);}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--blue) !important;box-shadow:0 0 0 3px rgba(103,65,217,.15);}
.app-header,.site-header{position:relative;overflow:hidden;}
.app-header::after,.site-header::after{content:'';position:absolute;top:-60%;right:-15%;width:75%;height:230%;background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,.10) 45%,rgba(255,220,120,.18) 50%,rgba(255,255,255,.10) 55%,transparent 70%);transform:rotate(8deg);pointer-events:none;}
.app-header>*,.site-header>*{position:relative;z-index:1;}
@media(prefers-reduced-motion:reduce){*{transition:none !important;animation:none !important;}}
</style>
</head>

let current = 0;

function buildGrid() {
  const grid = document.getElementById('stationGrid');
  grid.innerHTML = STATIONS.map((s, i) => {
    const isFinal = s.id === 'final';
    return `<button class="station-btn${isFinal ? ' final' : ''}" data-i="${i}" onclick="selectStation(${i})">${s.label} ${isFinal ? '· ' + s.name : ''}</button>`;
  }).join('');
}

function selectStation(i) {
  current = i;
  document.querySelectorAll('.station-btn').forEach((b, idx) => b.classList.toggle('selected', idx === i));
  renderCard(STATIONS[i]);
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderCard(s) {
  const area = document.getElementById('cardArea');
  const ownerName = roles[s.roleId]?.name;
  area.innerHTML = `
    <div class="card visible">
      <div class="card-top" style="background:${s.color};">
        <div class="card-num">STATION ${s.label}</div>
        <div class="card-name">${s.name}</div>
        <div class="card-verse">📖 ${s.verse}</div>
      </div>
      <div class="card-body">
        <div class="block">
          <div class="section-lbl">🙋 담당자</div>
          <span class="owner-chip ${ownerName ? '' : 'unset'}">${ownerName ? '👤 ' + esc(ownerName) : '담당자 미정 (teacher.html 역할표에서 입력)'}</span>
        </div>
        <div class="block">
          <div class="section-lbl">🎮 게임</div>
          <p>${s.game}</p>
        </div>
        <div class="block">
          <div class="section-lbl">🧩 세팅 방법</div>
          <div class="setup-box">${s.setup}</div>
        </div>
        <div class="block">
          <div class="section-lbl">🎙 30초 영적 해석 멘트 (게임 종료 직후 읽어주세요)</div>
          <div class="script-box">
            <div class="script-timer">⏱ 약 30초 분량</div>
            <p>${s.script}</p>
          </div>
        </div>
        <div class="block">
          <div class="section-lbl">✅ 통과 기준</div>
          <div class="pass-box">${s.pass}</div>
        </div>
        <div class="block">
          <div class="section-lbl">⚠️ 안전 주의사항</div>
          <div class="safety-box">${s.safety}</div>
        </div>
        <div class="block">
          <div class="section-lbl">🌧 우천 시 대체 운영</div>
          <div class="rain-box">${s.rainPlan}</div>
        </div>
        <div class="block">
          <div class="section-lbl">🧰 준비물</div>
          <div class="supply-tags">${s.supplies.map(x => `<span class="supply-tag">${x}</span>`).join('')}</div>
        </div>
        <div class="block">
          <div class="section-lbl">📢 종료 후 다음 조 안내 멘트</div>
          <div class="next-box">"${s.nextMsg}"</div>
        </div>
        <div class="nav-row">
          <button class="nav-btn" onclick="stepStation(-1)">← 이전 관문</button>
          <button class="nav-btn" onclick="stepStation(1)">다음 관문 →</button>
        </div>
      </div>
    </div>`;
}

function esc(v){ return v ? (v+'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])) : ''; }

function stepStation(delta) {
  const next = (current + delta + STATIONS.length) % STATIONS.length;
  selectStation(next);
}

buildGrid();
selectStation(0);

db.ref('teacherDoc/roles').on('value', snap => {
  roles = snap.val() || {};
  renderCard(STATIONS[current]);
});
</script>
